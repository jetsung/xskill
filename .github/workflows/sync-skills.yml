name: Sync Skills Index

on:
  workflow_dispatch:
  schedule:
    # 每 6 小时同步一次
    - cron: "0 */6 * * *"

# ---------------------------------------------------------------
# 技能源列表 —— 在此添加 / 删除 / 修改即可
# ---------------------------------------------------------------
env:
  SOURCES: |
    [
      {
        "name": "anthropics",
        "url": "https://github.com/anthropics/skills"
      },
      {
        "name": "github",
        "url": "https://github.com/github/awesome-copilot"
      },
      {
        "name": "antfu",
        "url": "https://github.com/antfu/skills"
      },
      {
        "name": "addyosmani",
        "url": "https://github.com/addyosmani/agent-skills"
      },
      {
        "name": "mattpocock",
        "url": "https://github.com/mattpocock/skills"
      }
    ]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      # - name: Set up Python
      #   uses: actions/setup-python@v6
      #   with:
      #     python-version: "3.x"

      # - name: Collect skills from sources
      #   env:
      #     SOURCES: ${{ vars.SOURCES || env.SOURCES }}
      #   run: python .github/scripts/collect_skills.py

      - name: Set up XSkill
        run: |
          bash ./site/install.sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Collect skills from sources
        env:
          SOURCES: ${{ vars.SOURCES || env.SOURCES }}
        run: |
          # 添加源
          echo "$SOURCES" | jq -c '.[]' | while read -r src; do
            name=$(echo "$src" | jq -r '.name // empty')
            url=$(echo "$src" | jq -r '.url')
            if [ -n "$name" ]; then
              xskill sources add --name "$name" --url "$url"
            else
              xskill sources add --url "$url"
            fi
          done
          # 启用缓存
          xskill config --set cache.enabled=true
          # 生成缓存
          xskill cache update
          # 复制缓存到输出目录
          mkdir -p output
          cp ~/.xskill/cache/skills.json output/skills.json
      - name: Fetch mdbook from mdbook branch
        run: |
          git fetch origin mdbook:mdbook || true
          if git show mdbook:man >/dev/null 2>&1; then
            mkdir -p output/man
            git checkout mdbook -- man/
            mv man output/
          fi

      - name: Collect output
        run: |
          cp schemas/*.json output/
          cp -r site/* output/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          destination_dir: .
          commit_message: "chore: update skills index [skip ci]"
          cname: ${{ vars.PAGES_DOMAIN }}
