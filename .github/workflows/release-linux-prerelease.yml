name: Build Prerelease (Linux)

on:
  push:
    tags:
      - 'v*-preview*'
      - 'v*-rc*'
      - 'v*-alpha*'
      - 'v*-beta*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_DIR: dist

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
            submodules: true
      - name: Extract tag name
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "TAG_NAME=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      - name: Update Rust
        run: |
          rustup update
          rustc --version
      - name: Install cargo-deb and cargo-generate-rpm
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm
      - name: Update submodules
        run: git submodule update --init --recursive
      - name: Build for Linux (x86_64-gnu)
        run: |
          cargo build -p xskill --release --target x86_64-unknown-linux-gnu
      - name: Package .deb, .rpm and tarball
        run: |
          mkdir ${{ env.RELEASE_DIR }}
          # .deb
          cargo deb --target x86_64-unknown-linux-gnu --no-build --no-strip
          mv target/x86_64-unknown-linux-gnu/debian/*.deb ${{ env.RELEASE_DIR }}/
          # .rpm
          cargo generate-rpm --target x86_64-unknown-linux-gnu
          mv target/x86_64-unknown-linux-gnu/generate-rpm/*.rpm ${{ env.RELEASE_DIR }}/
          # tarball
          tar -cJf "${{ env.RELEASE_DIR }}/xskill-v${{ steps.tag.outputs.VERSION }}-x86_64-unknown-linux-gnu.tar.xz" -C target/x86_64-unknown-linux-gnu/release xskill
      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packages-linux
          path: ${{ env.RELEASE_DIR }}/*
          retention-days: 1

  create-release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-dist/
          pattern: packages-*
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: all-dist/**/*
          generate_release_notes: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
