name: Publish Packages

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-crates:
    # 仅在正式版发布时触发
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Check CARGO_REGISTRY_TOKEN
        id: check-token
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "::warning::CARGO_REGISTRY_TOKEN is not set, skipping crates.io publish"
          fi

      - uses: actions/checkout@v7
        if: steps.check-token.outputs.has_token == 'true'
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: dtolnay/rust-toolchain@stable
        if: steps.check-token.outputs.has_token == 'true'

      - name: Publish to crates.io
        if: steps.check-token.outputs.has_token == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p xskill

  publish-winget:
    # 仅在正式版发布时触发
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Check WINGET_TOKEN
        id: check-token
        env:
          TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "::warning::WINGET_TOKEN is not set, skipping WinGet publish"
          fi

      - name: Submit manifest to WinGet
        if: steps.check-token.outputs.has_token == 'true'
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: Jetsung.XSkill
          installers-regex: 'xskill-v[\d.]+-(x86_64|aarch64)-pc-windows-msvc\.zip$'
          release-tag: ${{ github.event.release.tag_name }}
          fork-user: forkdo
          token: ${{ secrets.WINGET_TOKEN }}
